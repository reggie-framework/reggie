# Workflow for continuous integration (CI)
name: CI

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - master
      - main
  # Runs on pull requests
  pull_request:
  # Allows running this workflow manually from the Actions tab
  workflow_dispatch:

# Permissions
permissions:
  contents:  read        # default for all jobs
  packages:  read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Environment variables
env:
  UV_LINK_MODE: copy

jobs:
# ----------------------------------------------------------------------------------------------------------------------------------------------------
# Linter
# ----------------------------------------------------------------------------------------------------------------------------------------------------
  venv:
    name: Setup venv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        id: cache
        with:
          path: .venv
          key: lint-venv-${{ hashFiles('pyproject.toml') }}
      - name: Create virtual environment
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install ruff ty vulture
          python -m pip install --editable .

  ruff:
    name: Lint / ruff
    runs-on: ubuntu-latest
    needs: [venv]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: .venv
          key: lint-venv-${{ hashFiles('pyproject.toml') }}
      - name: Run ruff
        shell: bash
        run: |
          source .venv/bin/activate
          ruff --version
          ruff check --config pyproject.toml --preview reggie

  ty:
    name: Lint / ty
    runs-on: ubuntu-latest
    needs: [venv]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: .venv
          key: lint-venv-${{ hashFiles('pyproject.toml') }}
      - name: Run ty
        shell: bash
        run: |
          source .venv/bin/activate
          ty --version
          ty check --color always --project reggie

  vulture:
    name: Lint / vulture
    runs-on: ubuntu-latest
    needs: [venv]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: .venv
          key: lint-venv-${{ hashFiles('pyproject.toml') }}
      - name: Run vulture
        shell: bash
        run: |
          source .venv/bin/activate
          vulture --version
          vulture --config pyproject.toml reggie

# ----------------------------------------------------------------------------------------------------------------------------------------------------
# Compatibility
# ----------------------------------------------------------------------------------------------------------------------------------------------------
  compatibility:
    name: Compatibility / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: [ruff, ty, vulture]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { python-version: "3.10" }
          - { python-version: "3.11" }
          - { python-version: "3.12" }
          - { python-version: "3.13" }
          - { python-version: "3.14" }
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/checkout@v6
      - name: Run compatibility tests
        shell: bash
        run: |
          # Virtual environment
          python -m venv .venv
          source .venv/bin/activate
          # Compatibility
          python -m pip install --editable .
          reggie --help

# ----------------------------------------------------------------------------------------------------------------------------------------------------
# Regressionchecks
# ----------------------------------------------------------------------------------------------------------------------------------------------------
  Analyze_checks:
    name: Regressioncheck / ${{ matrix.check }}
    runs-on: ubuntu-latest
    needs: [venv, compatibility]
    strategy:
      fail-fast: false
      matrix:
        check:
          - CHE_Analyze_L2
          - CHE_Analyze_L2_file
          - CHE_Analyze_check_distribution
          - CHE_Analyze_check_hdf5
          - CHE_Analyze_compare_column
          - CHE_Analyze_compare_data_file
          - CHE_Analyze_integrate_line
          - CHE_Analyze_vtudiff
          - CHE_Analyze_Convtest_h
          - CHE_Analyze_Convtest_p
          - CHE_Analyze_Convtest_t
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: .venv
          key: lint-venv-${{ hashFiles('pyproject.toml') }}
      - name: Perform ${{ matrix.check }}
        shell: bash
        run: |
          source .venv/bin/activate
          reggie --dry-run regressioncheck/${{ matrix.check }}

  Analyze_checks_hdf5_tools:
    name: Regressioncheck (hdf5 tools) / ${{ matrix.check }}
    runs-on: ubuntu-latest
    needs: [venv, compatibility]
    strategy:
      fail-fast: false
      matrix:
        check:
          - CHE_Analyze_h5diff
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: .venv
          key: lint-venv-${{ hashFiles('pyproject.toml') }}
      - name: Install HDF5 tools
        run: sudo apt-get install -y hdf5-tools
      - name: Perform ${{ matrix.check }}
        shell: bash
        run: |
          source .venv/bin/activate
          reggie --dry-run regressioncheck/${{ matrix.check }}
