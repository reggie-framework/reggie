# Workflow for continuous integration (CI)
name: CI

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - master
      - main
  # Runs on pull requests
  pull_request:
  # Allows running this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      # note that these default values are only set when creating a workflow by hand on github, therfore the default values are also hardcoded below
      testcase_dir_build:
        # testcase directory used for building the executable with reggie
        default: 'CHE_maxwell'
      testcase_dir:
        # this testcase directory is used for the execution with the pre-compiled executable, note that it might contain more than one testcase, use $TESTCASE to specify a single on (for shorter runtime)
        default: 'NIG_Reservoir_single_core'
      testcase:
        # this testcase includes multiple cores for the reggie execution
        default: 'RELAX_N2'

# Permissions
permissions:
  contents:  read        # default for all jobs
  packages:  read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Environment variables
env:
  UV_LINK_MODE: copy

jobs:
# ----------------------------------------------------------------------------------------------------------------------------------------------------
# Setup venv
# ----------------------------------------------------------------------------------------------------------------------------------------------------
  venv:
    name: Setup venv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        id: cache
        with:
          path: .venv
          key: venv-${{ hashFiles('pyproject.toml') }}
      - name: Create virtual environment
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install ruff ty vulture pyhope
          python -m pip install --editable .

# ----------------------------------------------------------------------------------------------------------------------------------------------------
# piclas - download and build are two separated stages, so that both build processes (in piclas_build and Analyze_checks_piclas_reggie_build can run parallel)
# ----------------------------------------------------------------------------------------------------------------------------------------------------

  piclas_download:
    name: Clone piclas repository from github
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.upstream.outputs.commit }}
    steps:
      - name: Get upstream piclas commit
        id: upstream
        # key the cache on the piclas HEAD commit so the clone/build is only redone when piclas changes
        run: echo "commit=$(git ls-remote https://github.com/piclas-framework/piclas.git HEAD | cut -f1)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5
        id: cache
        with:
          path: piclas
          key: piclas-${{ steps.upstream.outputs.commit }}
      - name: Clone piclas from github
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # shallow clone (only the latest commit) to keep the cache small
          git clone --depth 1 https://github.com/piclas-framework/piclas.git
          cd piclas
          # HACK: overwrite default value of HDF5_USE_STATIC_LIBRARIES in cmake/SetLibraries.cmake to FALSE, since the ubuntu
          # libhdf5-openmpi-dev package ships both the static and shared version, but we need the shared version (which is not
          # found, because we first look for the static version) for linking into the shared library libpiclas.so
          # > patch the source before caching it, so every job building from this cache gets the fix
          grep -q 'SET(HDF5_USE_STATIC_LIBRARIES TRUE)' cmake/SetLibraries.cmake
          sed -i 's/SET(HDF5_USE_STATIC_LIBRARIES TRUE)/SET(HDF5_USE_STATIC_LIBRARIES FALSE)/' cmake/SetLibraries.cmake

  piclas_build:
    name: Build piclas executable
    runs-on: ubuntu-latest
    needs: [piclas_download]
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libopenmpi-dev libhdf5-openmpi-dev hdf5-tools libopenblas-dev
      # read-only restore of the source cache (guaranteed to exist since piclas_download ran)
      - uses: actions/cache/restore@v5
        with:
          path: piclas
          key: piclas-${{ needs.piclas_download.outputs.commit }}
          fail-on-cache-miss: true
      # separate read/write cache for the build directory, append the testcase_dir since the build changes with the testcase
      - uses: actions/cache@v5
        id: cache
        with:
          path: piclas/build
          key: piclas-build-${{ needs.piclas_download.outputs.commit }}-${{ inputs.testcase_dir || 'NIG_Reservoir_single_core' }}
      - name: Build piclas
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd piclas
          rm -rf build
          mkdir build
          cd build
          # create executable with tools script
          ../tools/cmake-builds-ini.sh ../regressioncheck/${{ inputs.testcase_dir || 'NIG_Reservoir_single_core' }}/builds.ini

# ----------------------------------------------------------------------------------------------------------------------------------------------------
# Linter
# ----------------------------------------------------------------------------------------------------------------------------------------------------
  ruff:
    name: Lint / ruff
    runs-on: ubuntu-latest
    needs: [venv]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ hashFiles('pyproject.toml') }}
      - name: Run ruff
        shell: bash
        run: |
          source .venv/bin/activate
          ruff --version
          ruff check --config pyproject.toml --preview reggie

  ty:
    name: Lint / ty
    runs-on: ubuntu-latest
    needs: [venv]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ hashFiles('pyproject.toml') }}
      - name: Run ty
        shell: bash
        run: |
          source .venv/bin/activate
          ty --version
          ty check --color always --project reggie

  vulture:
    name: Lint / vulture
    runs-on: ubuntu-latest
    needs: [venv]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ hashFiles('pyproject.toml') }}
      - name: Run vulture
        shell: bash
        run: |
          source .venv/bin/activate
          vulture --version
          vulture --config pyproject.toml reggie

# ----------------------------------------------------------------------------------------------------------------------------------------------------
# Compatibility
# ----------------------------------------------------------------------------------------------------------------------------------------------------
  compatibility:
    name: Compatibility / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: [ruff, ty, vulture]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { python-version: "3.10" }
          - { python-version: "3.11" }
          - { python-version: "3.12" }
          - { python-version: "3.13" }
          - { python-version: "3.14" }
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/checkout@v5
      - name: Run compatibility tests
        shell: bash
        run: |
          # Virtual environment
          python -m venv .venv
          source .venv/bin/activate
          # Compatibility
          python -m pip install --editable .
          reggie --help

# ----------------------------------------------------------------------------------------------------------------------------------------------------
# Regressionchecks
# ----------------------------------------------------------------------------------------------------------------------------------------------------
  Analyze_checks_single:
    # these analyzes do not need any external tools
    name: Regressioncheck / ${{ matrix.check }}
    runs-on: ubuntu-latest
    needs: [venv]
    strategy:
      fail-fast: false
      matrix:
        check:
          - CHE_Analyze_L2
          - CHE_Analyze_L2_file
          - CHE_Analyze_check_distribution
          - CHE_Analyze_check_hdf5
          - CHE_Analyze_compare_column
          - CHE_Analyze_compare_data_file
          - CHE_Analyze_integrate_line
          - CHE_Analyze_vtudiff
          - CHE_Analyze_Convtest_h
          - CHE_Analyze_Convtest_p
          - CHE_Analyze_Convtest_t
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ hashFiles('pyproject.toml') }}
      - name: Perform ${{ matrix.check }}
        shell: bash
        run: |
          source .venv/bin/activate
          reggie --dry-run regressioncheck/${{ matrix.check }}

  Analyze_checks_hdf5_tools:
    # these analyzes need the hdf5 toolset
    name: Regressioncheck (hdf5 tools) / ${{ matrix.check }}
    runs-on: ubuntu-latest
    needs: [venv]
    strategy:
      fail-fast: false
      matrix:
        check:
          - CHE_Analyze_h5diff
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ hashFiles('pyproject.toml') }}
      - name: Install HDF5 tools
        run: sudo apt-get update && sudo apt-get install -y hdf5-tools
      - name: Perform ${{ matrix.check }}
        shell: bash
        run: |
          source .venv/bin/activate
          reggie --dry-run regressioncheck/${{ matrix.check }}

  Analyze_checks_piclas_pre_build:
    # these analyzes need the pre-build piclas executable
    name: Regressioncheck (with piclas pre-build) / ${{ matrix.check }}
    runs-on: ubuntu-latest
    needs: [venv, piclas_download, piclas_build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - check: piclas/regressioncheck/${{ inputs.testcase_dir || 'NIG_Reservoir_single_core' }}/${{ inputs.testcase || 'RELAX_N2' }}
            extra_args: "-e piclas/build/bin/piclas"          # use pre-build executable
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libopenmpi-dev libhdf5-openmpi-dev hdf5-tools libopenblas-dev libglu1-mesa libxcursor1 libxft2 libxinerama1
      - uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ hashFiles('pyproject.toml') }}
      - uses: actions/cache/restore@v5
        with:
          path: piclas
          key: piclas-${{ needs.piclas_download.outputs.commit }}
          fail-on-cache-miss: true
      - uses: actions/cache/restore@v5
        with:
          path: piclas/build
          key: piclas-build-${{ needs.piclas_download.outputs.commit }}-${{ inputs.testcase_dir || 'NIG_Reservoir_single_core' }}
          fail-on-cache-miss: true
      - name: Perform ${{ matrix.check }} ${{ matrix.extra_args }}
        shell: bash
        run: |
          source .venv/bin/activate
          reggie ${{ matrix.check }} ${{ matrix.extra_args }}

  Analyze_checks_piclas_reggie_build:
    # these analyzes need the piclas repo and build the executable within reggie
    name: Regressioncheck (with piclas builds) / ${{ matrix.check }}
    runs-on: ubuntu-latest
    needs: [venv, piclas_download]
    strategy:
      fail-fast: false
      matrix:
        include:
          - check: piclas/regressioncheck/${{ inputs.testcase_dir_build || 'CHE_maxwell' }}
            extra_args: "--basedir piclas"          # reggie builds the executable itself and needs the dir containing the CMakeLists.txt
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libopenmpi-dev libhdf5-openmpi-dev hdf5-tools libopenblas-dev
      - uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ hashFiles('pyproject.toml') }}
      - uses: actions/cache/restore@v5
        with:
          path: piclas
          key: piclas-${{ needs.piclas_download.outputs.commit }}
          fail-on-cache-miss: true
      - name: Perform ${{ matrix.check }} ${{ matrix.extra_args }}
        shell: bash
        run: |
          source .venv/bin/activate
          reggie ${{ matrix.check }} ${{ matrix.extra_args }}